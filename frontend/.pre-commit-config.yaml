repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-yaml
      - id: sort-simple-yaml
      - id: check-added-large-files
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        language: system
        entry: npx prettier --write --ignore-unknown
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]
        pass_filenames: true
        priority: 0

      - id: eslint
        name: ESLint
        language: system
        entry: npx eslint --fix
        types_or: [ts, tsx]
        pass_filenames: true
        priority: 10

      - id: typecheck
        name: TypeScript
        language: system
        entry: npx tsc -b --noEmit
        pass_filenames: false
        always_run: true
        priority: 20

      - id: tests
        name: Tests
        language: system
        entry: npx vitest run
        pass_filenames: false
        always_run: true
        priority: 30
